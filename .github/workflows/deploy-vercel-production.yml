name: Deploy Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        run: vercel link --yes --project chat-para --scope aomi-labs --token="$VERCEL_TOKEN"

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --scope aomi-labs --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: vercel deploy --prod --yes --scope aomi-labs --token="$VERCEL_TOKEN"
